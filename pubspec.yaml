name: vsp_resorts_portal
description: "A high-fidelity hybrid Flutter & Dart portal app using Clean Architecture and Riverpod for VSP Resorts."
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.1.0
  intl: ^0.19.0
  url_launcher: ^6.3.2
  dio: ^5.7.0
  flutter_secure_storage: ^10.0.0
  image_picker: ^1.2.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/placeholder.txt
